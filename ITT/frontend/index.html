<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INVEST Platform — Smart Investment & Portfolio Management</title>
    <meta name="description" content="Grow your wealth with INVEST Platform. Secure investments, real-time portfolio tracking, referral rewards, and 24/7 support." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect to backend API (eliminates DNS + TCP handshake delay on first API call) -->
    <link rel="preconnect" href="https://api.investplatform.com" crossorigin />

    <!-- DNS prefetch for external image services used in the app -->
    <link rel="dns-prefetch" href="https://ui-avatars.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Inter font — preconnect so it loads faster, then load asynchronously -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- media="print" trick: loads non-render-blocking, then switches to all -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
